name: Deploy Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Show files
        run: |
          echo "📁 Файлы в корне:"
          ls -la
          echo "📁 Есть bot.py? $(ls -la | grep bot.py || echo 'НЕТ!')"
          
      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install
        run: pip install aiogram python-dotenv pyyaml
          
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          YOOMONEY_WALLET: ${{ secrets.YOOMONEY_WALLET }}
        run: |
          if [ -f "bot.py" ]; then
            echo "✅ bot.py найден, запускаю..."
            python bot.py
          elif [ -f "Bot.py" ]; then
            echo "✅ Bot.py найден (с большой буквы), запускаю..."
            python Bot.py
          else
            echo "❌ Файл bot.py не найден!"
            ls -la
            exit 1
          fi